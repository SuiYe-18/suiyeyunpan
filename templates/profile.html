<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>随叶云盘 - 个人资料</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#f5f7fa;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .container{width:400px;background:white;padding:30px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
        h1{text-align:center;margin-bottom:20px;color:#2c3e50;}
        .avatar-group{text-align:center;margin-bottom:20px;}
        .avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;margin-bottom:10px;}
        .form-group{margin-bottom:20px;}
        label{display:block;margin-bottom:8px;color:#666;}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;}
        button{width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;}
        .msg{text-align:center;margin:15px 0;color:green;}
        .back{text-align:center;margin-top:15px;}
        a{color:#3498db;text-decoration:none;}
    </style>
</head>
<body>
    <div class="container">
        <h1>随叶云盘 个人资料</h1>
        {% with msg = get_flashed_messages() %}
        {% if msg %}
        <div class="msg">{{ msg[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="POST" enctype="multipart/form-data">
            <div class="avatar-group">
                <img src="/avatar/{{ user.avatar }}" class="avatar" alt="头像">
                <input type="file" name="avatar" accept="image/*">
            </div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" value="{{ user.username }}" required>
            </div>
            <button type="submit">保存修改</button>
        </form>
        <div class="back">
            <a href="/">返回云盘主页</a>
        </div>
    </div>
</body>
</html>
