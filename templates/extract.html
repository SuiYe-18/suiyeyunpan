<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>随叶云盘 - 输入提取码</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#f5f7fa;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .container{width:400px;background:white;padding:30px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);text-align:center;}
        .publish-info{margin-bottom:20px;}
        .pub-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;margin-bottom:8px;}
        h1{margin-bottom:20px;color:#2c3e50;font-size:22px;}
        .form-group{margin-bottom:20px;}
        label{display:block;margin-bottom:8px;color:#666;}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;text-align:center;letter-spacing:4px;font-size:18px;}
        button{width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="publish-info">
            <img src="/avatar/{{ share_user.avatar }}" class="pub-avatar">
            <div>分享来自：{{ share_user.username }}</div>
        </div>
        <h1>随叶云盘 请输入提取码</h1>
        <form method="POST" action="/s/{{ share_code }}">
            <div class="form-group">
                <input type="text" name="extract_code" required maxlength="4" placeholder="4位提取码">
            </div>
            <button type="submit">确认下载</button>
        </form>
    </div>
</body>
</html>
