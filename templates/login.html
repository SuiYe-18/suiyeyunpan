<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>随叶云盘 - 登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#f5f7fa;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .container{width:400px;background:white;padding:30px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
        h1{text-align:center;margin-bottom:20px;color:#2c3e50;}
        .form-group{margin-bottom:20px;}
        label{display:block;margin-bottom:8px;color:#666;}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;}
        .graph-code{display:flex;gap:10px;align-items:center;}
        .graph-code input{flex:1;}
        .graph-code span{padding:10px;background:#eee;border-radius:6px;cursor:pointer;}
        button{width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;}
        .msg{text-align:center;margin:15px 0;color:red;}
        .link{text-align:center;margin-top:15px;}
        a{color:#3498db;text-decoration:none;}
    </style>
</head>
<body>
    <div class="container">
        <h1>随叶云盘 登录</h1>
        {% with msg = get_flashed_messages() %}
        {% if msg %}
        <div class="msg">{{ msg[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>账号（手机号/邮箱）</label>
                <input type="text" name="user" required>
            </div>
            <div class="form-group">
                <label>密码（6位字母+数字）</label>
                <input type="password" name="pwd" required>
            </div>
            <div class="form-group graph-code">
                <input type="text" name="graph_code" required maxlength="4" placeholder="图形验证码">
                <span id="graphCode">{{ graph_code }}</span>
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="link">
            没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
    <script>
        document.getElementById('graphCode').onclick = function(){
            window.location.reload();
        }
    </script>
</body>
</html>
